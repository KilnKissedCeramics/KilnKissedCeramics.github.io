<style>

    flex-direction: column;
    gap: 1.25rem;
    margin-top: 1.5rem;
  }

    grid-template-columns: minmax(220px, 0.9fr) minmax(0, 1.4fr);
    gap: 1.25rem;
    align-items: center;
    padding: 1rem;
    border: 1px solid rgba(26, 77, 180, 0.1);
    border-radius: 16px;
    background: #ffffff;

    width: 100%;

    justify-content: center;

    background: #f4f4f4;
    overflow: hidden;
  }

  .event-lightbox-image img {

    max-width: 100%;
    width: auto;
    height: auto;
    border-radius: 10px;

    max-height: 260px;
  }

    font-size: 1.35rem;
    line-height: 1.25;
    margin-bottom: 0.65rem;
  }

    font-weight: 700;
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 4px;
  }

  .event-title-button:hover,
  .event-title-button:focus {
    color: #e76dba;
    text-decoration-thickness: 3px;
  }

  .event-meta-row {
    margin-bottom: 0.45rem;
  }

  .event-card p:last-child,
  .event-meta-row:last-child {
    margin-bottom: 0;
  }

  .event-meta-row,
  .event-note {
    display: block;
  }

  .event-note {

  }

    flex-wrap: wrap;

    margin-top: 1rem;
  }

  .event-external-link,
  .event-lightbox-link {

    font-weight: 700;
    text-decoration: none;
    transition:

      opacity 0.2s ease;

  .event-details-button,
  .event-lightbox-link {
    border: 0;
    background: #1a4db4;
    color: #fff;
    cursor: pointer;
  }

    border: 1px solid rgba(26, 77, 180, 0.18);

    color: #1a4db4;

    transform: translateY(-1px);
    opacity: 0.95;
  }

    font-size: 1.15rem;

    flex-direction: column;
    gap: 0.55rem;
  }

    margin: 1rem 0 0.15rem;
    color: #333333;
    font-size: 1rem;
    line-height: 1.2;
  }

  .events-archive-year:first-child {
    margin-top: 0;
  }

    display: grid;
    grid-template-columns: 72px minmax(0, 1fr) auto;

    align-items: center;
    width: 100%;
    padding: 0.85rem 0.95rem;
    border: 1px solid rgba(26, 77, 180, 0.1);
    border-radius: 12px;
    background: #ffffff;
    color: inherit;
    font: inherit;
    text-align: left;
    cursor: pointer;
    transition:
      border-color 0.2s ease,
      background 0.2s ease,
      transform 0.06s ease;
  }

  .events-archive-item:hover,
  .events-archive-item:focus-visible {
    border-color: rgba(26, 77, 180, 0.28);
    background: #f5f8ff;
    transform: translateY(-1px);
  }

    color: #555555;
    font-size: 0.92rem;
    font-weight: 700;
    white-space: nowrap;

  .events-archive-title,
  .events-archive-meta {
    display: block;
  }

  .events-archive-title {
    color: #1a4db4;
    font-weight: 700;
    line-height: 1.35;
  }

  .events-archive-meta {
    margin-top: 0.2rem;
    color: #555555;
    font-size: 0.9rem;
    line-height: 1.4;
  }

  .events-archive-action {
    color: #1a4db4;
    font-size: 0.88rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .event-lightbox[hidden] {
    display: none;
  }

  .event-lightbox {
    position: fixed;
    inset: 0;
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem;
  }

  .event-lightbox-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.46);
  }

  .event-lightbox-panel {
    position: relative;
    z-index: 1;
    width: min(920px, 100%);
    max-height: min(760px, 92vh);

    border-radius: 18px;
    background: #ffffff;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);
  }

  .event-lightbox-close {

    top: 1rem;
    right: 1rem;
    z-index: 2;
    width: 36px;
    height: 36px;
    border-radius: 999px;
    border: 1px solid rgba(26, 77, 180, 0.18);
    background: #ffffff;
    color: #1a4db4;
    font-size: 1.3rem;
    line-height: 1;
    cursor: pointer;

    display: grid;
    grid-template-columns: minmax(240px, 0.9fr) minmax(0, 1.2fr);
    gap: 1.25rem;
    padding: 1.5rem;

    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 220px;
    padding: 0.75rem;
    border-radius: 14px;
    background: #f4f4f4;
  }

  .event-lightbox-image img {
    max-height: 360px;

    margin-bottom: 0.75rem;

    font-size: 0.85rem;
    font-weight: 700;
  }

  .event-lightbox-title {

    font-size: 1.55rem;
    line-height: 1.25;
  }

  .event-lightbox-description p {

  }

  .event-lightbox-nav {

    justify-content: space-between;

    color: #1a4db4;
    font-weight: 700;
    cursor: pointer;
  }

  .event-lightbox-nav button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }

    overflow: hidden;

    .event-card img {

    .event-lightbox-image img {
      max-height: 260px;
    }

    .event-lightbox-nav {
      padding: 0 1rem 1rem;
