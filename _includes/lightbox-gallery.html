<div class="lightbox-overlay" data-lightbox role="dialog" aria-modal="true" aria-label="Gallery image viewer" tabindex="-1">
  <div class="lightbox-content">
    <button aria-label="Close image" class="lightbox-close" type="button">
      ×
    </button>
    <button aria-label="Previous image" class="lightbox-prev" type="button">
      ‹
    </button>
    <img alt="Expanded view" class="lightbox-image" loading="lazy" src="" />
    <button aria-label="Next image" class="lightbox-next" type="button">
      ›
    </button>
  </div>
</div>
<script>
  (function () {
    window.dataLayer = window.dataLayer || [];

    var overlay = document.querySelector("[data-lightbox]");
    if (!overlay) return;

    var imgEl = overlay.querySelector(".lightbox-image");
    var closeBtn = overlay.querySelector(".lightbox-close");
    var prevBtn = overlay.querySelector(".lightbox-prev");
    var nextBtn = overlay.querySelector(".lightbox-next");
    var triggers = Array.prototype.slice.call(
      document.querySelectorAll(".lightbox-trigger"),
    );

    if (!imgEl || !triggers.length) return;

    var currentIndex = -1;
    var lastFocusedElement = null;

    function getImageData(index) {
      var trigger = triggers[index];
      if (!trigger) return null;

      return {
        trigger: trigger,
        src: trigger.getAttribute("data-full") || trigger.getAttribute("src") || "",
        alt: trigger.getAttribute("alt") || "Gallery image",
        index: index,
      };
    }

    function getStatus() {
      return overlay.classList.contains("is-open") ? "open" : "closed";
    }

    function openAtIndex(index, openSource) {
      if (!triggers.length) return;

      var total = triggers.length;

      if (index < 0) {
        index = total - 1;
      } else if (index >= total) {
        index = 0;
      }

      var imageData = getImageData(index);
      if (!imageData) return;

      currentIndex = index;
      imgEl.src = imageData.src;
      imgEl.alt = imageData.alt;
      overlay.classList.add("is-open");

      if (openSource) {
        window.dataLayer.push({
          event: "gallery_lightbox_open",
          gallery_image_src: imageData.src,
          gallery_image_alt: imageData.alt,
          gallery_image_index: String(index),
          interaction_source: openSource,
          page: "gallery",
        });
      }

      closeBtn.focus();
    }

    function navigate(direction) {
      if (!triggers.length) return;

      var fromIndex = currentIndex === -1 ? 0 : currentIndex;
      var toIndex = direction === "next" ? fromIndex + 1 : fromIndex - 1;

      if (toIndex < 0) {
        toIndex = triggers.length - 1;
      } else if (toIndex >= triggers.length) {
        toIndex = 0;
      }

      var imageData = getImageData(toIndex);

      window.dataLayer.push({
        event: "gallery_lightbox_navigate",
        gallery_image_src: imageData ? imageData.src : "",
        gallery_image_alt: imageData ? imageData.alt : "",
        gallery_image_index: String(toIndex),
        navigation_direction: direction,
        from_index: String(fromIndex),
        to_index: String(toIndex),
        page: "gallery",
      });

      openAtIndex(toIndex);
    }

    function closeLightbox(closeSource) {
      if (getStatus() !== "open") return;

      var imageData = currentIndex >= 0 ? getImageData(currentIndex) : null;

      window.dataLayer.push({
        event: "gallery_lightbox_close",
        gallery_image_src: imageData ? imageData.src : "",
        gallery_image_alt: imageData ? imageData.alt : "",
        gallery_image_index: String(currentIndex),
        close_source: closeSource || "unknown",
        page: "gallery",
      });

      overlay.classList.remove("is-open");
      imgEl.src = "";
      imgEl.alt = "Expanded view";
      currentIndex = -1;

      if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
        lastFocusedElement.focus();
      }
    }

    triggers.forEach(function (trigger, index) {
      trigger.setAttribute("data-lightbox-index", String(index));
      trigger.setAttribute("tabindex", "0");
      trigger.setAttribute("role", "button");
      trigger.setAttribute("aria-label", "Open gallery image: " + (trigger.getAttribute("alt") || "Gallery image"));

      trigger.addEventListener("click", function (event) {
        event.preventDefault();
        lastFocusedElement = trigger;
        openAtIndex(index, "image");
      });

      trigger.addEventListener("keydown", function (event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          lastFocusedElement = trigger;
          openAtIndex(index, "keyboard");
        }
      });
    });

    overlay.addEventListener("click", function (event) {
      if (event.target === overlay) {
        closeLightbox("overlay");
      }
    });

    if (closeBtn) {
      closeBtn.addEventListener("click", function () {
        closeLightbox("x_button");
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener("click", function () {
        navigate("next");
      });
    }

    if (prevBtn) {
      prevBtn.addEventListener("click", function () {
        navigate("previous");
      });
    }

    document.addEventListener("keydown", function (event) {
      if (!overlay.classList.contains("is-open")) return;

      if (event.key === "Escape" || event.key === "Esc") {
        closeLightbox("escape_key");
      } else if (event.key === "ArrowRight") {
        navigate("next");
      } else if (event.key === "ArrowLeft") {
        navigate("previous");
      }
    });
  })();
</script>
