{% if page.home_styles %}
<style>
  /* Index-only header logo sizing */
  header img.logo {
    max-width: 500px; /* base desktop size */
    height: auto;
  }

  /* Mobile nav enhancements for index.html only */
  .nav-toggle {
    display: none;
  }

  .nav-overlay {
    display: none;
  }

  .nav-close {
    display: none;
  }

  @media (max-width: 768px) and (orientation: portrait) {
    header {
      padding: 0.75rem 1rem;
      text-align: left;
    }

    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header img.logo {
      max-width: 275px; /* larger logo on portrait mobile */
      height: auto;
    }

    /* Drawer-style nav on the right */
    header .nav {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 78%;
      max-width: 320px;
      background: #ffffff;
      box-shadow: -4px 0 18px rgba(0, 0, 0, 0.16);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 3rem 1.5rem 2rem;
      transform: translateX(100%);
      transition:
        transform 0.25s ease,
        opacity 0.2s ease;
      z-index: 1001;
    }

    header .nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 0;
      margin: 0;
    }

    .nav .cart-right {
      position: static;
      transform: none;
      margin-top: 2rem;
    }

    .nav .cart-right a {
      display: inline-block;
      padding: 0.5rem 0;
    }

    .nav-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(26, 77, 180, 0.18);
      background: #ffffff;
      cursor: pointer;
      padding: 0;
    }

    .nav-toggle:focus-visible {
      outline: 2px solid rgba(26, 77, 180, 0.35);
      outline-offset: 2px;
    }

    .nav-toggle-bars {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-toggle-bar {
      width: 18px;
      height: 2px;
      border-radius: 1px;
      background: #1a4db4;
      transition:
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .nav-close {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid rgba(26, 77, 180, 0.18);
      background: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      line-height: 1;
      color: #1a4db4;
    }

    .nav-close:focus-visible {
      outline: 2px solid rgba(26, 77, 180, 0.35);
      outline-offset: 2px;
    }

    body.nav-open header .nav {
      transform: translateX(0);
    }

    .nav-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 1000;
    }

    body.nav-open .nav-overlay {
      opacity: 1;
      pointer-events: auto;
      display: block;
    }

    /* Slightly smaller type for Where to Buy section on portrait mobile */
    .where-to-buy {
      font-size: 0.95rem;
    }
    .where-to-buy h2 {
      font-size: 1.3rem;
    }
    .where-to-buy h3 {
      font-size: 1.05rem;
    }
  }
  /* Simple lightbox overlay for index banner */
  .lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.72);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  .lightbox-overlay.is-open {
    display: flex;
  }
  .lightbox-content {
    max-width: 94vw;
    max-height: 94vh;
    padding: 0.75rem;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
    position: relative;
  }
  .lightbox-image {
    display: block;
    max-width: 100%;
    max-height: 80vh;
    height: auto;
    width: auto;
  }
  .lightbox-close {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: 1px solid rgba(26, 77, 180, 0.18);
    background: #ffffff;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    line-height: 1;
    color: #1a4db4;
  }
  .lightbox-close:focus-visible {
    outline: 2px solid rgba(26, 77, 180, 0.35);
    outline-offset: 2px;
  }
</style>
{% endif %}

<!-- Social sharing (Open Graph / Twitter) -->
<meta content="{{ page.og_type | default: 'website' }}" property="og:type" />
<meta content="{{ page.og_site_name | default: 'Kiln Kissed Ceramics' }}" property="og:site_name" />
<meta content="{{ page.canonical_url }}" property="og:url" />
<meta content="{{ page.title }}" property="og:title" />
<meta
  content="{{ page.og_description | default: page.description }}"
  property="og:description"
/>
<meta
  content="{{ page.og_image }}"
  property="og:image"
/>
{% if page.og_image_width %}
<meta content="{{ page.og_image_width }}" property="og:image:width" />
{% endif %}
{% if page.og_image_height %}
<meta content="{{ page.og_image_height }}" property="og:image:height" />
{% endif %}
{% if page.og_image_alt %}
<meta
  content="{{ page.og_image_alt }}"
  property="og:image:alt"
/>
{% endif %}

<meta content="{{ page.twitter_card | default: 'summary_large_image' }}" name="twitter:card" />
<meta
  content="{{ page.title }}"
  name="twitter:title"
/>
<meta
  content="{{ page.twitter_description | default: page.og_description | default: page.description }}"
  name="twitter:description"
/>
<meta
  content="{{ page.twitter_image | default: page.og_image }}"
  name="twitter:image"
/>
