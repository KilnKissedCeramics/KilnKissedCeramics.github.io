<!-- Favicons -->
<link href="/favicon.ico" rel="icon" sizes="any" />
<link
  href="/assets/favicon/favicon-32.png"
  rel="icon"
  sizes="32x32"
  type="image/png"
/>
<link
  href="/assets/favicon/favicon-16.png"
  rel="icon"
  sizes="16x16"
  type="image/png"
/>
<link
  href="/assets/favicon/favicon-48.png"
  rel="icon"
  sizes="48x48"
  type="image/png"
/>
<link
  href="/assets/favicon/apple-touch-icon.png"
  rel="apple-touch-icon"
  sizes="180x180"
/>
<!-- End Favicons -->

<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>{{ page.title }}</title>
{% if page.description %}
<meta content="{{ page.description }}" name="description" />
{% endif %}
<meta content="{{ page.robots | default: 'index,follow' }}" name="robots" />
<link href="{{ page.canonical_url }}" rel="canonical" />
<link href="/style.css" rel="stylesheet" />

{% include styles-nav.html %} {% if page.home_styles %} {% include
styles-home.html %} {% endif %} {% if page.page_styles == "about" %} {% include
styles-about.html %} {% endif %} {% if page.page_styles == "shop" %} {% include
styles-shop.html %} {% endif %}

<!-- Social sharing (Open Graph / Twitter) -->
<meta content="website" property="og:type" />
<meta content="Kiln Kissed Ceramics" property="og:site_name" />
<meta content="{{ page.canonical_url }}" property="og:url" />
<meta content="{{ page.og_title | default: page.title }}" property="og:title" />
<meta
  content="{{ page.og_description | default: page.description }}"
  property="og:description"
/>
<meta
  content="{{ page.og_image | default: 'https://www.kilnkissedceramics.com/assets/banner/banner-og-1200x630.jpg' }}"
  property="og:image"
/>
<meta content="1200" property="og:image:width" />
<meta content="630" property="og:image:height" />
<meta
  content="{{ page.og_image_alt | default: 'Handmade ceramics with glossy, colorful glaze by Kiln Kissed Ceramics' }}"
  property="og:image:alt"
/>

<meta content="summary_large_image" name="twitter:card" />
<meta
  content="{{ page.og_title | default: page.title }}"
  name="twitter:title"
/>
<meta
  content="{{ page.og_description | default: page.description }}"
  name="twitter:description"
/>
<meta
  content="{{ page.og_image | default: 'https://www.kilnkissedceramics.com/assets/banner/banner-og-1200x630.jpg' }}"
  name="twitter:image"
/>
