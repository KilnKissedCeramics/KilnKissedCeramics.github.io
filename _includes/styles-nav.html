<style>
/* Shared header logo sizing + mobile nav (portrait only) */
      header img.logo {
        max-width: 500px; /* base desktop size */
        height: auto;
      }

      .nav-toggle {
        display: none;
      }

      .nav-overlay {
        display: none;
      }

      .nav-close {
        display: none;
      }

      @media (max-width: 768px) and (orientation: portrait) {
        header {
          padding: 0.75rem 1rem;
          text-align: left;
        }

        .header-bar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 1rem;
        }

        header img.logo {
          max-width: 275px;
          height: auto;
        }

        /* Drawer-style nav on the right */
        header .nav {
          position: fixed;
          top: 0;
          right: 0;
          height: 100vh;
          width: 78%;
          max-width: 320px;
          background: #ffffff;
          box-shadow: -4px 0 18px rgba(0, 0, 0, 0.16);
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          justify-content: flex-start;
          padding: 3rem 1.5rem 2rem;
          transform: translateX(100%);
          transition:
            transform 0.25s ease,
            opacity 0.2s ease;
          z-index: 1001;
        }

        header .nav ul {
          list-style: none;
          display: flex;
          flex-direction: column;
          gap: 1rem;
          padding: 0;
          margin: 0;
        }

        .nav .cart-right {
          position: static;
          transform: none;
          margin-top: 2rem;
        }

        .nav .cart-right a {
          display: inline-block;
          padding: 0.5rem 0;
        }

        .nav-toggle {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          width: 40px;
          height: 40px;
          border-radius: 999px;
          border: 1px solid rgba(26, 77, 180, 0.18);
          background: #ffffff;
          cursor: pointer;
          padding: 0;
        }

        .nav-toggle:focus-visible {
          outline: 2px solid rgba(26, 77, 180, 0.35);
          outline-offset: 2px;
        }

        .nav-toggle-bars {
          display: inline-flex;
          flex-direction: column;
          gap: 4px;
        }

        .nav-toggle-bar {
          width: 18px;
          height: 2px;
          border-radius: 1px;
          background: #1a4db4;
          transition:
            transform 0.2s ease,
            opacity 0.2s ease;
        }

        .nav-close {
          position: absolute;
          top: 1.25rem;
          right: 1.25rem;
          width: 32px;
          height: 32px;
          border-radius: 999px;
          border: 1px solid rgba(26, 77, 180, 0.18);
          background: #ffffff;
          cursor: pointer;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          font-size: 1.1rem;
          line-height: 1;
          color: #1a4db4;
        }

        .nav-close:focus-visible {
          outline: 2px solid rgba(26, 77, 180, 0.35);
          outline-offset: 2px;
        }

        body.nav-open header .nav {
          transform: translateX(0);
        }

        .nav-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.35);
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.2s ease;
          z-index: 1000;
        }

        body.nav-open .nav-overlay {
          opacity: 1;
          pointer-events: auto;
          display: block;
        }
      }
</style>
